<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>aleAnimiec – Oglądaj</title>
  <link rel="icon" href="/favicon.ico" />
  <link href="data:image/x-icon;base64,AAABAAEAEBAAAAAAAABoBQAAFgAAACgAAAAQAAAAIAAAAAEACAAAAAAAAAEAAAAAAAAAAAAAAAEAAAAAAAAAAAAAAOX/AAAA/wAA0+sAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAEBAwMDAQEBAAAAAAAAAQMDAQEBAQEBAwEBAAAAAQMBAQICAgICAgEDAQEAAAEBAQICAgICAgICAQMBAAABAQICAQEDAwEBAgIBAQAAAAECAQEDAQEBAQMCAQAAAAAAAAMBAQEBAQEDAAAAAAAAAAABAwEBAQEDAQAAAAAAAAAAAAEDAQEBAQAAAAAAAAAAAAAAAQEBAQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP//AAD//wAA8A8AAMADAACAAQAAAAAAAAAAAAAAAAAAgAEAAMADAADgBwAA8A8AAPgfAAD8PwAA//8AAP//AAA=" rel="icon" type="image/x-icon">
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<header>
  <img src="/logo.png" alt="Logo" class="header-logo" />
  <h1>ale<span>Animiec</span> <span style="font-weight:300;font-size:1rem">— oglądaj</span></h1>
  <div class="badge">
    <span class="dot" id="conn-dot"></span>
    <span id="conn-label">Łączenie…</span>
  </div>
</header>

<div class="container">
  <div class="video-wrap mt-2" id="video-wrap">
    <video id="player" preload="auto"></video>
    <div id="embed-player" class="hidden"></div>
    <div class="video-placeholder" id="placeholder">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="currentColor">
        <path d="M4 2l16 10L4 22V2z"/>
      </svg>
      <span>Czekaj na film od admina…</span>
    </div>
    <div class="video-controls" id="video-controls">
      <div class="volume-control">
        <button class="btn-volume" id="btn-mute" title="Wycisz/Włącz dźwięk">
          <svg id="vol-icon-on" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.08"/>
          </svg>
          <svg id="vol-icon-off" class="hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
          </svg>
        </button>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1" />
      </div>
      <button class="btn-fullscreen" id="btn-fullscreen" title="Pełny ekran">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="status-strip mt-1" id="status-strip">
    <span class="dot" id="sync-dot"></span>
    <span id="sync-label">Brak synchronizacji</span>
  </div>

  <!-- Timer bar -->
  <div class="timer-bar mt-2" id="timer-bar">
    <div class="timer-bar__time">
      <span id="timer-current">00:00.000</span>
      <span class="timer-bar__sep">/</span>
      <span id="timer-duration">00:00.000</span>
    </div>
    <div class="timer-bar__drift">
      Dryft: <span id="timer-drift">0</span> ms
    </div>
    <button class="btn btn-ghost btn-sm" id="btn-resync">⟳ Synchronizuj</button>
  </div>
</div>

<!-- sync pill (top-right) -->
<div id="sync-indicator">
  <span class="dot" id="pill-dot"></span>
  <span id="pill-label">—</span>
</div>

<script src="/config.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
  // Load socket.io client from backend when BACKEND_URL is set, otherwise local
  (function() {
    var src = window.BACKEND_URL ? window.BACKEND_URL + '/socket.io/socket.io.js' : '/socket.io/socket.io.js';
    document.write('<script src="' + src + '"><\/script>');
  })();
</script>
<script src="/viewer.js"></script>
</body>
</html>
